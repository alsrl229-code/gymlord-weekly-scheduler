    document.addEventListener("click", (event) => {
      const target = event.target.closest("button");
      if (!target) return;

      if (target.classList.contains("tab")) {
        activeTab = target.dataset.tab;
        render();
        return;
      }

      const action = target.dataset.action;
      const id = target.dataset.id;
      if (action === "delete-member") deleteMember(id);
      if (action === "duplicate-member") duplicateMember(id);
      if (action === "select-chat-member") setChatMember(id);
      if (action === "use-candidate") appendChatCandidate(target.dataset.value || "");
      if (action === "copy-message") {
        const member = state.members.find((item) => item.id === id);
        if (member) copyText(textareaValue(`message-${id}`, buildMessage(member)), "카톡 문구를 복사했습니다.");
      }
      if (action === "save-message") {
        saveCustomMessage(id, textareaValue(`message-${id}`, ""));
      }
      if (action === "reset-message") {
        resetCustomMessage(id);
      }
      if (action === "copy-chat-draft") copyText(currentChatDraftText(), "카톡 작업 문구를 복사했습니다.");
      if (action === "save-chat-draft") saveCurrentChatDraft();
      if (action === "reset-chat-draft") {
        const member = getChatMember();
        if (member) resetCustomMessage(member.id);
      }
      if (action === "apply-chat-final") applyChatFinal();
      if (action === "reset-duration-override") resetDurationOverride(id, target.dataset.key || "");
      if (action === "remove-candidate-slot") removeCandidateSlot(id, target.dataset.key || "");
      if (action === "copy-broj-value") copyText(target.dataset.value || "", "브로제이 입력값을 복사했습니다.");
      if (action === "set-status") {
        updateReview(id, "status", target.dataset.status);
        render();
      }
      if (action === "reset-final") {
        const member = state.members.find((item) => item.id === id);
        if (member) {
          updateReview(id, "finalText", member.fixedText || "");
          render();
        }
      }

      if (target.id === "addMember") addMember();
      if (target.id === "resetToRealMembers") resetToRealMembers();
      if (target.id === "downloadMemberTemplate") downloadFile("짐로드_회원업로드_양식.csv", memberTemplateCsv(), "text/csv;charset=utf-8");
      if (target.id === "exportMembersCsv") exportMembersCsv();
      if (target.id === "importMembersButton") document.getElementById("importMembersInput").click();
      if (target.id === "copyAllMessages") copyAllMessages();
      if (target.id === "exportMessagesCsv") exportMessagesCsv();
      if (target.id === "parseChatReply") parseChatReplyToCandidate();
      if (target.id === "refreshChatCandidates") render();
      if (target.id === "markFixedConfirmed") markFixedConfirmed();
      if (target.id === "resetWeekResponses") resetWeekResponses();
      if (target.id === "copyBrojRows") copyBrojRows();
      if (target.id === "exportBrojCsv") exportBrojCsv();
      if (target.id === "copyHistoryRows") copyHistoryRows();
      if (target.id === "exportHistoryCsv") exportHistoryCsv();
      if (target.id === "openDeployGuide") window.open("DEPLOY.md", "_blank");
      if (target.id === "signInGoogle") signInWithGoogle();
      if (target.id === "sendMagicLink") sendEmailLoginLink();
      if (target.id === "saveCloudNow") saveCloudStateNow();
      if (target.id === "loadCloudNow") loadCloudState();
      if (target.id === "signOutCloud") signOutCloud();
      if (target.id === "copySummary") copySummary();
      if (target.id === "setNextMonday") {
        state.weekStart = toISODate(getNextMonday(new Date()));
        state.historyWeek = state.weekStart;
        saveState();
        render();
      }
      if (target.id === "exportJson") {
        downloadFile(`짐로드_스케줄데이터_${state.weekStart}.json`, JSON.stringify(state, null, 2), "application/json;charset=utf-8");
      }
      if (target.id === "importJsonButton") document.getElementById("importJsonInput").click();
    });

    document.addEventListener("input", (event) => {
      const target = event.target;
      if (target.id === "trainerName") {
        state.trainerName = target.value;
        saveState();
      }
      if (target.id === "memberSearch") {
        state.memberSearch = target.value;
        saveState();
        if (event.isComposing || memberSearchComposing) return;
        scheduleMemberSearchRender();
      }
      if (target.id === "chatCandidateText") {
        state.chatCandidateText = target.value;
        saveState();
        updateChatDraftPreview();
      }
      if (target.id === "chatPasteText") {
        state.chatPasteText = target.value;
        saveState();
        updateChatParsePreview();
      }
      if (target.dataset.durationOverrideId && target.dataset.durationKey) {
        setDurationOverride(target.dataset.durationOverrideId, target.dataset.durationKey, target.value);
        updateConflictOnlyPreview();
      }
      if (target.dataset.conflictIgnoreId && target.dataset.conflictKey) {
        setConflictIgnore(target.dataset.conflictIgnoreId, target.dataset.conflictKey, target.checked);
      }
      if (target.dataset.memberId && target.dataset.memberField) {
        updateMember(target.dataset.memberId, target.dataset.memberField, target.type === "checkbox" ? target.checked : target.value);
      }
      if (target.dataset.reviewId && target.dataset.reviewField) {
        updateReview(target.dataset.reviewId, target.dataset.reviewField, target.value);
      }
    });

    document.addEventListener("compositionstart", (event) => {
      const target = event.target;
      if (target.id !== "memberSearch") return;
      memberSearchComposing = true;
      window.clearTimeout(memberSearchRenderTimer);
    });

    document.addEventListener("compositionend", (event) => {
      const target = event.target;
      if (target.id !== "memberSearch") return;
      memberSearchComposing = false;
      state.memberSearch = target.value;
      saveState();
      scheduleMemberSearchRender(180);
    });

    document.addEventListener("change", (event) => {
      const target = event.target;
      if (target.id === "weekStart") {
        state.weekStart = target.value || toISODate(getNextMonday(new Date()));
        state.historyWeek = state.weekStart;
        getWeekReview();
        saveState();
        render();
      }
      if (target.id === "messageTone") {
        state.messageTone = target.value;
        saveState();
        renderMessages();
      }
      if (target.id === "chatMemberSelect") {
        setChatMember(target.value);
      }
      if (target.id === "chatMode") {
        state.chatMode = target.value;
        saveState();
        render();
      }
      if (target.id === "includePendingBroj") {
        state.includePendingBroj = target.checked;
        saveState();
        render();
      }
      if (target.id === "hideDoneBroj") {
        state.hideDoneBroj = target.checked;
        saveState();
        renderBroj();
      }
      if (target.dataset.brojDoneKey) {
        setBrojDone(target.dataset.brojDoneKey, target.checked);
      }
      if (target.id === "historyWeekSelect") {
        state.historyWeek = target.value || state.weekStart;
        saveState();
        renderHistory();
      }
      if (target.dataset.memberId && target.dataset.memberField) {
        updateMember(target.dataset.memberId, target.dataset.memberField, target.type === "checkbox" ? target.checked : target.value);
        renderMetrics();
      }
      if (target.dataset.reviewId && target.dataset.reviewField) {
        updateReview(target.dataset.reviewId, target.dataset.reviewField, target.value);
        if ((activeTab === "responses" || activeTab === "chat") && target.dataset.reviewField === "status") {
          render();
        } else {
          renderMetrics();
        }
      }
      if (target.id === "importMembersInput" && target.files?.[0]) {
        const reader = new FileReader();
        reader.onload = () => importMembersCsv(String(reader.result || ""));
        reader.readAsText(target.files[0], "utf-8");
        target.value = "";
      }
      if (target.id === "importJsonInput" && target.files?.[0]) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const imported = JSON.parse(String(reader.result || ""));
            state = normalizeStateObject(imported.appState || imported);
            if (!state.historyWeek || !getHistoryWeeks().includes(state.historyWeek)) state.historyWeek = state.weekStart;
            saveState();
            render();
            showToast("데이터를 불러왔습니다.");
          } catch (error) {
            showToast("JSON을 읽지 못했습니다.");
          }
        };
        reader.readAsText(target.files[0], "utf-8");
        target.value = "";
      }
    });

    render();
    initCloudSync();
  </script>
</body>
</html>
